name: Deploy

# Auto-deploy to Vercel production on every push to main, after CI passes.
#
# We use GitHub Actions (not Vercel's native Git integration) because the
# Vercel GitHub App isn't installed on this org. This workflow replaces the
# manual `npx vercel --prod` + alias step.
#
# Secrets required on the repo (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN — personal token from https://vercel.com/account/tokens
#
# Project IDs below are NOT secret — they're already in the committed
# `dashboard/.vercel/project.json` equivalents for any Vercel-linked repo
# and don't grant any access on their own.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Vercel production
    runs-on: ubuntu-latest
    # Only deploy if CI passed. A failed CI run shouldn't ship.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: dashboard
    env:
      VERCEL_ORG_ID: team_DRGyg2KOKBpzr4zvLfTSH9bs
      VERCEL_PROJECT_ID: prj_hfeHMQKzTJPRYhlvS8tMEuRvWK1K
      # Stable customer-facing alias — keep in sync with CLAUDE.md.
      ALIAS: dashboard-sooty-seven-64.vercel.app

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the exact commit that CI ran on, not the branch tip.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Alias to stable URL
        run: vercel alias set "${{ steps.deploy.outputs.url }}" "$ALIAS" --token=${{ secrets.VERCEL_TOKEN }}
