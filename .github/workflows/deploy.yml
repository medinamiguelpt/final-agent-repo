name: Deploy

# Auto-deploy to Vercel production on every push to main, after CI passes.
#
# Strategy: hand the source to Vercel's build farm via `vercel deploy` and
# let it do the build. We previously tried `vercel build --prod` locally
# inside this workflow, which failed because Vercel-side env vars (e.g.
# NEXT_PUBLIC_SUPABASE_*) don't get fully materialised locally by
# `vercel pull` in every case. Handing Vercel the source directly is both
# simpler and matches what `npx vercel --prod` does manually.
#
# Secrets required on the repo (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN — personal token from https://vercel.com/account/tokens
#
# Project IDs below are NOT secret — they're in the committed
# `dashboard/.vercel/project.json` and don't grant any access on their own.

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Vercel production
    runs-on: ubuntu-latest
    # Only deploy if CI passed. A failed CI run shouldn't ship.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: dashboard
    env:
      VERCEL_ORG_ID: team_DRGyg2KOKBpzr4zvLfTSH9bs
      VERCEL_PROJECT_ID: prj_hfeHMQKzTJPRYhlvS8tMEuRvWK1K
      # Stable customer-facing alias — keep in sync with CLAUDE.md.
      ALIAS: dashboard-sooty-seven-64.vercel.app

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the exact commit CI ran on, not the branch tip.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel production
        id: deploy
        run: |
          URL=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Alias to stable URL
        run: vercel alias set "${{ steps.deploy.outputs.url }}" "$ALIAS" --token=${{ secrets.VERCEL_TOKEN }}
